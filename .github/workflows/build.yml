name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: CellularTTL.exe
          - os: macos-latest
            artifact_name: CellularTTL-macOS
          - os: ubuntu-latest
            artifact_name: CellularTTL-Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            pyinstaller --onefile --noconsole --name "CellularTTL" ttl_utility.py
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            pyinstaller --windowed --onefile --name "CellularTTL" ttl_utility.py
          else
            pyinstaller --onefile --name "CellularTTL" ttl_utility.py
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: dist/CellularTTL*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-latest-build/CellularTTL.exe
            artifacts/macos-latest-build/CellularTTL
            artifacts/ubuntu-latest-build/CellularTTL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
